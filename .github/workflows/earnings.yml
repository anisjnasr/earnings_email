name: Earnings email

on:
  schedule:
    - cron: "0 4 * * 1-5"   # 04:00 UTC on weekdays = 8:00am UAE time (UTC+4)
  workflow_dispatch:         # adds a "Run workflow" button for manual testing

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install timezone data
        run: pip install tzdata

      - name: Send earnings email
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Optional: set RECIPIENT as a secret to send somewhere other than yourself.
          RECIPIENT: ${{ secrets.RECIPIENT }}
        run: python earnings_email.py
