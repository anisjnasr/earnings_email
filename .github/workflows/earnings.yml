name: Earnings email

on:
  schedule:
    - cron: "0 4 * * 0"     # weekly: Sunday at 8:00am UAE (04:00 UTC)
    - cron: "0 4 * * 1-5"   # daily: Monday-Friday at 8:00am UAE (04:00 UTC)
  workflow_dispatch:
    inputs:
      digest:
        description: "Digest to send"
        required: true
        default: both
        type: choice
        options:
          - both
          - weekly
          - daily

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install timezone data
        run: pip install tzdata

      - name: Send earnings email
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Optional: set RECIPIENT as a secret to send somewhere other than yourself.
          RECIPIENT: ${{ secrets.RECIPIENT }}
          DIGEST_MODE: ${{ github.event_name == 'schedule' && (github.event.schedule == '0 4 * * 0' && 'weekly' || 'daily') || inputs.digest }}
        run: |
          if [ "$DIGEST_MODE" = "weekly" ] || [ "$DIGEST_MODE" = "both" ]; then
            python earnings_email.py weekly
          fi
          if [ "$DIGEST_MODE" = "daily" ] || [ "$DIGEST_MODE" = "both" ]; then
            python earnings_email.py daily
          fi
